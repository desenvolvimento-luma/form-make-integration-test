<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste Webhook Make → RD Station</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 480px;
        margin: 40px auto;
        padding: 0 16px;
      }
      h1 {
        font-size: 1.3rem;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
        font-size: 0.9rem;
      }
      input,
      select {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        box-sizing: border-box;
      }
      button {
        margin-top: 20px;
        padding: 10px 24px;
        font-size: 1rem;
        cursor: pointer;
      }
      #status {
        margin-top: 16px;
        padding: 10px;
        display: none;
        border-radius: 4px;
      }
      #status.success {
        display: block;
        background: #d4edda;
        color: #155724;
      }
      #status.error {
        display: block;
        background: #f8d7da;
        color: #721c24;
      }
    </style>
  </head>
  <body>
    <h1>Teste: Formulário → Make → RD Station</h1>

    <form id="form">
      <label for="nome">Nome do contato</label>
      <input type="text" id="nome" required />

      <label for="email">Email do contato</label>
      <input type="email" id="email" required />

      <label for="telefone">Telefone do contato</label>
      <input type="tel" id="telefone" required placeholder="88900000000" />

      <label for="cidade">Cidade</label>
      <input type="text" id="cidade" required />

      <label for="faturamento">Faturamento Mensal</label>
      <select id="faturamento" required>
        <option value="">Selecione...</option>
        <option value="Até 50 mil">Até 50 mil</option>
        <option value="De 50 mil a 100 mil">De 50 mil a 100 mil</option>
        <option value="Acima de 100 mil">Acima de 100 mil</option>
      </select>

      <button type="submit">Enviar teste</button>
    </form>

    <div id="status"></div>

    <script>
      const MAKE_WEBHOOK_URL =
        "https://hook.us2.make.com/4wqrvutl5cea4e1fyjv7ufrw9656lils";

      const form = document.getElementById("form");
      const status = document.getElementById("status");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        status.className = "";
        status.style.display = "none";

        const payload = {
          nome: document.getElementById("nome").value.trim(),
          email: document.getElementById("email").value.trim(),
          telefone: document.getElementById("telefone").value.trim(),
          cidade: document.getElementById("cidade").value.trim(),
          faturamento_mensal: document.getElementById("faturamento").value,
          source: "teste-webhook-make-rd",
        };

        console.log("Payload enviado:", payload);

        try {
          await fetch(MAKE_WEBHOOK_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "text/plain",
            },
            body: JSON.stringify(payload),
          });

          status.textContent =
            "Payload enviado. Confira no Make se o webhook recebeu.";
          status.className = "success";
          form.reset();
        } catch (err) {
          console.error("Erro ao enviar:", err);
          status.textContent = "Erro de conexão: " + err.message;
          status.className = "error";
        }
      });
    </script>
  </body>
</html>
